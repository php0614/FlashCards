<style>

  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd;
    flex-shrink: 0;
  }
  .header .meta { font-size: 13px; color: #999; }
  .mode-btn {
    background: #3498db; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .quiz-view {
    flex: 1; display: flex; flex-direction: column;
    padding: 16px; gap: 12px; overflow: hidden;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 20px 16px;
    text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .card .word {
    font-size: 28px; font-weight: 700; line-height: 1.3;
    min-height: 70px; display: flex; align-items: center; justify-content: center;
    word-break: break-word;
  }
  .reveal-card {
    background: #fff; border-radius: 12px; padding: 16px;
    text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    justify-content: center; gap: 12px; min-height: 0;
  }
  .meaning { font-size: 18px; color: #0a8f6a; font-weight: 500; line-height: 1.4; }
  .example { font-size: 14px; color: #666; font-style: italic; line-height: 1.5; }
  .btn-row { display: flex; gap: 10px; flex-shrink: 0; }
  .btn-row button {
    flex: 1; height: 56px; border: none; border-radius: 14px;
    font-size: 20px; font-weight: 700; color: #fff; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-row button:active { opacity: 0.7; }
  .btn-row button:disabled { opacity: 0.4; }
  .btn-unknown { background: #e74c3c; }
  .btn-known { background: #2ecc71; }
  .btn-hmm { background: #f1c40f; color: #333 !important; }
  .slider-row {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    font-size: 13px; color: #888;
  }
  .slider-row input[type=range] { flex: 1; accent-color: #0a8f6a; }
  .bottom-bar { display: flex; gap: 8px; flex-shrink: 0; }
  .bottom-bar button {
    flex: 1; padding: 8px; background: #fff; color: #666;
    border: 1px solid #ccc; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  .learn-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .learn-view.active { display: flex; }
  .quiz-view.hidden { display: none; }
  .word-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .word-list table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .word-list th {
    position: sticky; top: 0; background: #f0f0f0;
    padding: 10px 8px; text-align: left; font-size: 13px;
    border-bottom: 2px solid #ccc;
  }
  .word-list td {
    padding: 10px 8px; border-bottom: 1px solid #e8e8e8;
    vertical-align: top; line-height: 1.4;
  }
  .word-col { font-weight: 600; white-space: nowrap; }
</style>
</head>
<body>
<div class="header">
  <span class="meta" id="metaInfo"></span>
  <button class="mode-btn" id="modeBtn" onclick="toggleMode()">Learn</button>
</div>
<div class="quiz-view" id="quizView">
  <div class="card"><div class="word" id="wordLabel"></div></div>
  <div class="reveal-card">
    <div class="meaning" id="meaningLabel"></div>
    <div class="example" id="exampleLabel"></div>
  </div>
  <div class="btn-row">
    <button class="btn-unknown" id="btnUnknown" onclick="answer('unknown')">?</button>
    <button class="btn-known" id="btnKnown" onclick="answer('known')">!</button>
    <button class="btn-hmm" id="btnHmm" onclick="answer('hmm')">Hmm</button>
  </div>
  <div class="slider-row">
    <span>Delay:</span>
    <input type="range" id="slider" min="2" max="20" value="6" oninput="sliderChanged()">
    <span id="sliderVal">3.0s</span>
  </div>
  <div class="bottom-bar">
    <button onclick="exportProb()">Export Prob</button>
    <button onclick="resetProb()">Reset Prob</button>
    <button onclick="syncToLocal()">Save Snapshot</button>
  </div>
</div>
<div class="learn-view" id="learnView">

    <table>
      <thead><tr><th>Word</th><th>Definition</th><th>Example</th></tr></thead>

    </table>
  </div>
</div>

const STORAGE_KEY = 'flashcard_probs_v1';
let words = [], currentIndex = -1, isRevealing = false, delaySec = 3.0, timer = null, isLearningMode = false;

function init() {
  words = BAKED_WORDS.map(w => ({...w}));
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { const m = JSON.parse(saved); for (const w of words) if (w.word in m) w.prob = m[w.word]; } catch(e) {} }
  showNextWord();
}
function saveProbs() {
  const m = {}; for (const w of words) m[w.word] = Math.round(w.prob*100)/100;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(m));
}
function pickNextWord() {
  if (!words.length) return -1;
  const total = words.reduce((s,w) => s+w.prob, 0);
  let r = Math.random()*total;
  for (let i=0;i<words.length;i++) { r-=words[i].prob; if(r<=0) return i; }
  return words.length-1;
}
function showNextWord() {
  clearTimeout(timer); isRevealing = false; currentIndex = pickNextWord();
  if (currentIndex<0) return;
  const w = words[currentIndex];
  document.getElementById('wordLabel').textContent = w.word;
  document.getElementById('meaningLabel').textContent = '';
  document.getElementById('exampleLabel').textContent = '';
  document.getElementById('metaInfo').textContent = `${Math.round(w.prob)}% \u00b7 ${words.length} words`;
  setButtonsEnabled(true);
}
function answer(type) {
  if (isRevealing||currentIndex<0) return;
  isRevealing=true; setButtonsEnabled(false);
  const w = words[currentIndex];
  if (type==='unknown') w.prob=Math.min(100,w.prob+50);
  else if (type==='known') w.prob=Math.max(5,w.prob-50);
  else w.prob=40+Math.random()*40;
  saveProbs();
  document.getElementById('meaningLabel').textContent = w.meaning;
  document.getElementById('exampleLabel').textContent = w.example;
  document.getElementById('metaInfo').textContent = `${Math.round(w.prob)}% \u00b7 ${words.length} words`;
  timer = setTimeout(showNextWord, delaySec*1000);
}
function setButtonsEnabled(e) {
  document.getElementById('btnUnknown').disabled=!e;
  document.getElementById('btnKnown').disabled=!e;
  document.getElementById('btnHmm').disabled=!e;
}
function sliderChanged() {
  delaySec = document.getElementById('slider').value/2;
  document.getElementById('sliderVal').textContent = delaySec.toFixed(1)+'s';
}
function toggleMode() {
  isLearningMode=!isLearningMode;
  const btn=document.getElementById('modeBtn');
  if(isLearningMode){btn.textContent='Quiz';clearTimeout(timer);document.getElementById('quizView').classList.add('hidden');document.getElementById('learnView').classList.add('active');populateLearnTable();}
  else{btn.textContent='Learn';document.getElementById('quizView').classList.remove('hidden');document.getElementById('learnView').classList.remove('active');showNextWord();}
}
function populateLearnTable(){
  const s=[...words].sort(()=>Math.random()-0.5), tbody=document.getElementById('learnBody');
  tbody.innerHTML=s.map(w=>`<tr><td class="word-col">${esc(w.word)}</td><td>${esc(w.meaning)}</td><td style="font-size:12px;color:#666;font-style:italic">${esc(w.example)}</td></tr>`).join('');
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function exportProb(){
  let csv='word,probability\n';for(const w of words)csv+=`"${w.word}",${Math.round(w.prob*100)/100}\n`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='words_prob.csv';a.click();
}
function resetProb(){if(!confirm('Reset all probabilities to 100%?'))return;for(const w of words)w.prob=100;saveProbs();document.getElementById('metaInfo').textContent=`100% \u00b7 ${words.length} words`;}
function syncToLocal(){saveProbs();alert('Probabilities saved to browser storage.');}
document.addEventListener('keydown',e=>{if(isLearningMode)return;if(e.key==='1')answer('unknown');else if(e.key==='2')answer('known');else if(e.key==='3')answer('hmm');});
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{if(isLearningMode)return;const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>60){if(dx<0)answer('unknown');else answer('known');}});
init();
</script>
